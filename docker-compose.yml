# ═══════════════════════════════════════════
# Fangame 生产环境 Docker Compose
# ═══════════════════════════════════════════
#
# 首次部署:
#   docker compose up -d
#   docker compose run --rm migrate   # 执行数据库迁移
#
# 后续更新:
#   docker compose build
#   docker compose run --rm migrate   # 执行迁移（如有新迁移文件）
#   docker compose up -d
#
# Coolify 部署:
#   自动使用此文件，migrate 需手动触发或通过 Coolify 命令执行

services:
  # ── PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fangame-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fangame
      POSTGRES_PASSWORD: fangame
      POSTGRES_DB: fangame
      PGPASSWORD: fangame
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fangame -d fangame && psql -U fangame -d fangame -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - fangame

  # ── 数据库迁移（独立运行，不随 app 启动）────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/migrate-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fangame:fangame@db:5432/fangame}
    networks:
      - fangame
    profiles:
      - migrate

  # ── Fangame 应用 ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-0.1.0}
    container_name: fangame-app
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fangame:fangame@db:5432/fangame}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      PORT: "3000"
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - fangame

networks:
  fangame:

volumes:
  pg_data:
  uploads_data:
