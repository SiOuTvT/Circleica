# ============================================================
# 宝塔面板 Nginx 配置 - 解决 HTTP 431 错误
# ============================================================
# 
# 方法一（推荐）：通过宝塔面板的「自定义配置」添加
#   1. 宝塔面板 → 网站 → 找到你的站点 → 点击「设置」
#   2. 左侧菜单 → 点击「配置文件」
#   3. 你会看到类似这样的内容：
#
#      server
#      {
#          listen 80;
#          server_name your-domain.com;
#          index index.php index.html;
#          root /www/wwwroot/fangame/public;
#          ...
#          location ~ .*\.(js|css)?$
#          {
#              ...
#          }
#      }
#
#   4. 在 server { ... } 块内，在第一个 location 之前，添加以下内容：
#
# ============================================================

# ---- 复制以下内容，粘贴到 server {} 块内 ----

# 增大请求头缓冲区（NextAuth JWT cookies 较大，必须增大否则登录时触发 431 错误）
large_client_header_buffers 4 32k;
client_header_buffer_size 32k;

# 请求体最大 10MB（支持图片上传）
client_max_body_size 10m;

# 代理缓冲区（如果使用反向代理，需要这些配置）
proxy_buffer_size 32k;
proxy_buffers 4 32k;
proxy_busy_buffers_size 32k;

# ---- 复制结束 ----


# ============================================================
#
# 方法二：如果方法一找不到 server 块
#   1. 宝塔面板 → 网站 → 找到你的站点 → 点击「设置」
#   2. 左侧菜单 → 点击「自定义配置」
#   3. 在「自定义配置」中添加上面的内容
#
# ============================================================

# 如果以上都找不到，可能是用了 Nginx 反向代理模式（不是 PHP/纯静态模式）：
#   1. 宝塔面板 → 网站 → 设置 → 左侧「反向代理」
#   2. 点击「配置」按钮，可以在弹出的编辑器中看到 location / 块
#   3. 在 location 块外面（但在 server 块内）添加上面的 buffer 配置
#
# ============================================================